<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <!-- Título -->
  <text x="450" y="30" text-anchor="middle" font-size="16" font-weight="bold" font-family="Arial">Diagrama de Conexiones — code_RF_procc</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- TRANSMISOR (izquierda) -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- Arduino Nano (placa TX) -->
  <rect x="80" y="120" width="180" height="220" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2" rx="5"/>
  <text x="170" y="145" text-anchor="middle" font-weight="bold" font-family="Arial" font-size="13">Arduino Nano</text>
  <text x="170" y="163" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">(ATmega328P) — TX</text>
  <!-- Pines del Nano -->
  <text x="95" y="195" font-family="monospace" font-size="10">D2  (INT0)</text>
  <text x="95" y="215" font-family="monospace" font-size="10">D10 (GPIO)</text>
  <text x="95" y="240" font-family="monospace" font-size="10">5V</text>
  <text x="95" y="260" font-family="monospace" font-size="10">GND</text>
  <text x="95" y="285" font-family="monospace" font-size="10">5V</text>
  <text x="95" y="305" font-family="monospace" font-size="10">GND</text>

  <!-- Módulo TX 433MHz -->
  <rect x="320" y="170" width="150" height="90" fill="#d5e8d4" stroke="#82b366" stroke-width="2" rx="5"/>
  <text x="395" y="195" text-anchor="middle" font-weight="bold" font-family="Arial" font-size="11">TX 433MHz</text>
  <text x="395" y="212" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">(FS1000A)</text>
  <text x="335" y="235" font-family="monospace" font-size="10">DATA</text>
  <text x="335" y="250" font-family="monospace" font-size="10">VCC</text>

  <!-- Conexiones TX -->
  <!-- D10 → DATA (verde = señal) -->
  <line x1="260" y1="212" x2="320" y2="232" stroke="#00AA00" stroke-width="2"/>
  <text x="285" y="217" text-anchor="middle" fill="#00AA00" font-size="9" font-family="Arial">D10→DATA</text>
  <!-- 5V → VCC (rojo = alimentación) -->
  <line x1="260" y1="237" x2="320" y2="247" stroke="#FF0000" stroke-width="2"/>
  <text x="288" y="248" text-anchor="middle" fill="#FF0000" font-size="9" font-family="Arial">5V</text>
  <!-- GND (negro) -->
  <line x1="260" y1="257" x2="320" y2="255" stroke="#000000" stroke-width="2"/>
  <text x="290" y="264" text-anchor="middle" fill="#000000" font-size="9" font-family="Arial">GND</text>

  <!-- Antena TX -->
  <line x1="470" y1="200" x2="490" y2="200" stroke="#888" stroke-width="1.5"/>
  <line x1="490" y1="175" x2="490" y2="225" stroke="#888" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="500" y="205" font-family="Arial" font-size="9" fill="#888">17cm</text>

  <!-- Pulsador -->
  <rect x="320" y="285" width="120" height="60" fill="#d5e8d4" stroke="#82b366" stroke-width="2" rx="5"/>
  <text x="380" y="310" text-anchor="middle" font-weight="bold" font-family="Arial" font-size="11">Pulsador NO</text>
  <text x="380" y="327" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">(wake button)</text>

  <!-- Conexiones Pulsador -->
  <!-- D2 → Terminal 1 (verde = señal) -->
  <line x1="260" y1="192" x2="290" y2="192" stroke="#00AA00" stroke-width="2"/>
  <line x1="290" y1="192" x2="290" y2="300" stroke="#00AA00" stroke-width="2"/>
  <line x1="290" y1="300" x2="320" y2="300" stroke="#00AA00" stroke-width="2"/>
  <text x="305" y="250" text-anchor="middle" fill="#00AA00" font-size="9" font-family="Arial" transform="rotate(-90,305,250)">D2 (INT0)</text>
  <!-- GND → Terminal 2 (negro) -->
  <line x1="260" y1="302" x2="275" y2="302" stroke="#000000" stroke-width="2"/>
  <line x1="275" y1="302" x2="275" y2="330" stroke="#000000" stroke-width="2"/>
  <line x1="275" y1="330" x2="320" y2="330" stroke="#000000" stroke-width="2"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- RECEPTOR (derecha) -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- Arduino Uno (placa RX) -->
  <rect x="590" y="120" width="180" height="220" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2" rx="5"/>
  <text x="680" y="145" text-anchor="middle" font-weight="bold" font-family="Arial" font-size="13">Arduino Uno R3</text>
  <text x="680" y="163" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">(ATmega328P) — RX</text>
  <!-- Pines del Uno -->
  <text x="605" y="195" font-family="monospace" font-size="10">D2  (INT0)</text>
  <text x="605" y="220" font-family="monospace" font-size="10">5V</text>
  <text x="605" y="245" font-family="monospace" font-size="10">GND</text>

  <!-- Módulo RX 433MHz -->
  <rect x="590" y="365" width="150" height="90" fill="#d5e8d4" stroke="#82b366" stroke-width="2" rx="5"/>
  <text x="665" y="390" text-anchor="middle" font-weight="bold" font-family="Arial" font-size="11">RX 433MHz</text>
  <text x="665" y="407" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">(MX-RM-5V)</text>
  <text x="605" y="430" font-family="monospace" font-size="10">DATA</text>
  <text x="605" y="445" font-family="monospace" font-size="10">VCC</text>

  <!-- Conexiones RX -->
  <!-- D2 → DATA (verde = señal) -->
  <line x1="625" y1="200" x2="625" y2="365" stroke="#00AA00" stroke-width="2"/>
  <text x="612" y="280" fill="#00AA00" font-size="9" font-family="Arial" transform="rotate(-90,612,280)">D2→DATA</text>
  <!-- 5V → VCC (rojo = alimentación) -->
  <line x1="660" y1="225" x2="660" y2="365" stroke="#FF0000" stroke-width="2"/>
  <text x="672" y="300" fill="#FF0000" font-size="9" font-family="Arial" transform="rotate(-90,672,300)">5V→VCC</text>
  <!-- GND (negro) -->
  <line x1="695" y1="250" x2="695" y2="365" stroke="#000000" stroke-width="2"/>
  <text x="707" y="310" fill="#000000" font-size="9" font-family="Arial" transform="rotate(-90,707,310)">GND</text>

  <!-- Antena RX -->
  <line x1="740" y1="395" x2="760" y2="395" stroke="#888" stroke-width="1.5"/>
  <line x1="760" y1="370" x2="760" y2="420" stroke="#888" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="770" y="400" font-family="Arial" font-size="9" fill="#888">17cm</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- Enlace RF entre TX y RX -->
  <!-- ═══════════════════════════════════════════════ -->
  <line x1="490" y1="200" x2="580" y2="395" stroke="#FF8800" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="530" y="290" text-anchor="middle" font-family="Arial" font-size="11" fill="#FF8800" font-weight="bold">433MHz</text>
  <text x="530" y="305" text-anchor="middle" font-family="Arial" font-size="9" fill="#FF8800">30-100m</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- Leyenda -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="30" y="410" width="200" height="80" fill="#f9f9f9" stroke="#ccc" stroke-width="1" rx="3"/>
  <text x="45" y="430" font-family="Arial" font-size="10" font-weight="bold">Leyenda:</text>
  <line x1="45" y1="445" x2="75" y2="445" stroke="#FF0000" stroke-width="2"/>
  <text x="80" y="449" font-family="Arial" font-size="9">VCC (alimentación)</text>
  <line x1="45" y1="460" x2="75" y2="460" stroke="#000000" stroke-width="2"/>
  <text x="80" y="464" font-family="Arial" font-size="9">GND (tierra)</text>
  <line x1="45" y1="475" x2="75" y2="475" stroke="#00AA00" stroke-width="2"/>
  <text x="80" y="479" font-family="Arial" font-size="9">Señal digital</text>
  <line x1="140" y1="445" x2="170" y2="445" stroke="#FF8800" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="175" y="449" font-family="Arial" font-size="9">RF 433MHz</text>
</svg>
